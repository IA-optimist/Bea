<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Workflow Visualization</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        
        #controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }
        
        #controls h3 {
            margin: 0 0 10px 0;
            color: #333;
        }
        
        #controls button {
            margin: 5px;
            padding: 8px 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        #controls button:hover {
            background: #0056b3;
        }
        
        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }
        
        #status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }
        
        .status-active { background: #28a745; }
        .status-idle { background: #ffc107; }
        .status-error { background: #dc3545; }
        
        .tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="controls">
        <h3>3D Controls</h3>
        <button onclick="zoomIn()">Zoom In</button>
        <button onclick="zoomOut()">Zoom Out</button>
        <button onclick="rotate()">Rotate</button>
        <button onclick="resetView()">Reset View</button>
        <button onclick="toggleAnimation()">Toggle Animation</button>
    </div>
    
    <div id="info">
        <div>Agents: <span id="agent-count">0</span></div>
        <div>Workflows: <span id="workflow-count">0</span></div>
        <div>Connected: <span class="status-indicator status-active" id="connection-status"></span></div>
    </div>
    
    <div id="status">
        <div>Status: <span id="system-status">Initializing...</span></div>
    </div>
    
    <div class="tooltip" id="tooltip"></div>
    
    <script>
        // 3D Visualization Engine
        class Visualization3D {
            constructor() {
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.agents = [];
                this.workflows = [];
                this.connections = [];
                this.camera = { x: 0, y: 0, z: -500, zoom: 1 };
                this.animation = { enabled: true, time: 0 };
                this.mouse = { x: 0, y: 0, isDown: false };
                this.lastMouse = { x: 0, y: 0 };
                
                this.setupCanvas();
                this.setupEventListeners();
                this.connectWebSocket();
                this.animate();
            }
            
            setupCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                
                window.addEventListener('resize', () => {
                    this.canvas.width = window.innerWidth;
                    this.canvas.height = window.innerHeight;
                });
            }
            
            setupEventListeners() {
                this.canvas.addEventListener('mousedown', (e) => {
                    this.mouse.isDown = true;
                    this.lastMouse.x = e.clientX;
                    this.lastMouse.y = e.clientY;
                });
                
                this.canvas.addEventListener('mousemove', (e) => {
                    this.mouse.x = e.clientX;
                    this.mouse.y = e.clientY;
                    
                    if (this.mouse.isDown) {
                        const dx = e.clientX - this.lastMouse.x;
                        const dy = e.clientY - this.lastMouse.y;
                        
                        // Rotate camera
                        this.camera.x += dx * 0.5;
                        this.camera.y += dy * 0.5;
                        
                        this.lastMouse.x = e.clientX;
                        this.lastMouse.y = e.clientY;
                    }
                });
                
                this.canvas.addEventListener('mouseup', () => {
                    this.mouse.isDown = false;
                });
                
                this.canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
                    this.camera.zoom *= zoomFactor;
                    this.camera.zoom = Math.max(0.1, Math.min(3, this.camera.zoom));
                });
            }
            
            connectWebSocket() {
                this.ws = new WebSocket('ws://localhost:8000/ws');
                
                this.ws.onopen = () => {
                    console.log('WebSocket connected');
                    document.getElementById('connection-status').className = 'status-indicator status-active';
                    document.getElementById('system-status').textContent = 'Connected';
                };
                
                this.ws.onmessage = (event) => {
                    const message = JSON.parse(event.data);
                    this.handleWebSocketMessage(message);
                };
                
                this.ws.onclose = () => {
                    console.log('WebSocket disconnected');
                    document.getElementById('connection-status').className = 'status-indicator status-idle';
                    document.getElementById('system-status').textContent = 'Disconnected';
                    setTimeout(() => this.connectWebSocket(), 3000);
                };
                
                this.ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    document.getElementById('connection-status').className = 'status-indicator status-error';
                    document.getElementById('system-status').textContent = 'Error';
                };
            }
            
            handleWebSocketMessage(message) {
                switch (message.type) {
                    case 'init':
                        this.initializeData(message.data);
                        break;
                    case 'agent_update':
                        this.updateAgent(message.data);
                        break;
                    case 'workflow_update':
                        this.updateWorkflow(message.data);
                        break;
                    case '3d_update':
                        this.update3DVisualization(message.data);
                        break;
                }
            }
            
            initializeData(data) {
                this.agents = data.agents || [];
                this.workflows = data.workflows || [];
                this.updateInfo();
                this.createConnections();
            }
            
            updateAgent(agentData) {
                const agent = this.agents.find(a => a.id === agentData.id);
                if (agent) {
                    Object.assign(agent, agentData);
                } else {
                    this.agents.push(agentData);
                }
                this.updateInfo();
            }
            
            updateWorkflow(workflowData) {
                const workflow = this.workflows.find(w => w.id === workflowData.id);
                if (workflow) {
                    Object.assign(workflow, workflowData);
                } else {
                    this.workflows.push(workflowData);
                }
                this.updateInfo();
                this.createConnections();
            }
            
            update3DVisualization(data) {
                // Handle 3D visualization updates
                this.createConnections();
            }
            
            updateInfo() {
                document.getElementById('agent-count').textContent = this.agents.length;
                document.getElementById('workflow-count').textContent = this.workflows.length;
            }
            
            createConnections() {
                this.connections = [];
                
                this.workflows.forEach(workflow => {
                    workflow.agent_ids.forEach(agentId => {
                        const fromAgent = this.agents.find(a => a.id === agentId);
                        const toAgent = this.agents.find(a => a.id === agentId); // Self-connection for now
                        
                        if (fromAgent && toAgent) {
                            this.connections.push({
                                from: fromAgent,
                                to: toAgent,
                                workflow: workflow
                            });
                        }
                    });
                });
            }
            
            project3D(x, y, z) {
                // Apply camera transformations
                const dx = x - this.camera.x;
                const dy = y - this.camera.y;
                const dz = z - this.camera.z;
                
                // Simple perspective projection
                const scale = this.camera.zoom / (dz * 0.01 + 1);
                const screenX = this.canvas.width / 2 + dx * scale;
                const screenY = this.canvas.height / 2 + dy * scale;
                
                return { x: screenX, y: screenY, scale: scale };
            }
            
            drawAgent(agent) {
                const pos = this.getAgentPosition(agent);
                const projected = this.project3D(pos.x, pos.y, pos.z);
                
                // Draw agent node
                this.ctx.save();
                this.ctx.translate(projected.x, projected.y);
                this.ctx.scale(projected.scale, projected.scale);
                
                // Node color based on status
                const colors = {
                    'running': '#28a745',
                    'idle': '#ffc107',
                    'completed': '#17a2b8',
                    'error': '#dc3545'
                };
                
                const color = colors[agent.status] || '#6c757d';
                
                // Draw node
                this.ctx.beginPath();
                this.ctx.arc(0, 0, 20, 0, Math.PI * 2);
                this.ctx.fillStyle = color;
                this.ctx.fill();
                
                // Draw progress ring
                if (agent.status === 'running' && agent.progress > 0) {
                    this.ctx.beginPath();
                    this.ctx.arc(0, 0, 25, 0, Math.PI * 2 * agent.progress);
                    this.ctx.strokeStyle = color;
                    this.ctx.lineWidth = 3;
                    this.ctx.stroke();
                }
                
                // Draw label
                this.ctx.fillStyle = 'white';
                this.ctx.font = '12px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText(agent.name.substring(0, 8), 0, 5);
                
                this.ctx.restore();
                
                // Draw tooltip on hover
                if (this.isMouseOver(projected.x, projected.y, 20 * projected.scale)) {
                    this.showTooltip(agent.name, projected.x, projected.y);
                }
            }
            
            drawConnection(connection) {
                const fromPos = this.getAgentPosition(connection.from);
                const toPos = this.getAgentPosition(connection.to);
                
                const fromProj = this.project3D(fromPos.x, fromPos.y, fromPos.z);
                const toProj = this.project3D(toPos.x, toPos.y, toPos.z);
                
                this.ctx.beginPath();
                this.ctx.moveTo(fromProj.x, fromProj.y);
                this.ctx.lineTo(toProj.x, toProj.y);
                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                this.ctx.lineWidth = 2;
                this.ctx.stroke();
                
                // Draw data flow animation
                if (connection.workflow.status === 'running') {
                    const progress = (Date.now() % 2000) / 2000;
                    const x = fromProj.x + (toProj.x - fromProj.x) * progress;
                    const y = fromProj.y + (toProj.y - fromProj.y) * progress;
                    
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, 3, 0, Math.PI * 2);
                    this.ctx.fillStyle = '#00ff00';
                    this.ctx.fill();
                }
            }
            
            getAgentPosition(agent) {
                // Position agents in a circle
                const index = this.agents.indexOf(agent);
                const angle = (index / this.agents.length) * Math.PI * 2;
                const radius = 200;
                
                return {
                    x: Math.cos(angle) * radius,
                    y: Math.sin(angle) * radius,
                    z: 0
                };
            }
            
            isMouseOver(x, y, radius) {
                const dx = this.mouse.x - x;
                const dy = this.mouse.y - y;
                return Math.sqrt(dx * dx + dy * dy) < radius;
            }
            
            showTooltip(text, x, y) {
                const tooltip = document.getElementById('tooltip');
                tooltip.textContent = text;
                tooltip.style.left = x + 10 + 'px';
                tooltip.style.top = y - 30 + 'px';
                tooltip.style.display = 'block';
            }
            
            hideTooltip() {
                document.getElementById('tooltip').style.display = 'none';
            }
            
            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Draw connections first
                this.connections.forEach(connection => {
                    this.drawConnection(connection);
                });
                
                // Draw agents
                this.agents.forEach(agent => {
                    this.drawAgent(agent);
                });
                
                // Update animation
                if (this.animation.enabled) {
                    this.animation.time += 0.01;
                }
                
                // Hide tooltip if mouse not over any agent
                this.hideTooltip();
                
                requestAnimationFrame(() => this.animate());
            }
        }
        
        // Global functions for controls
        let viz3d;
        
        function zoomIn() {
            viz3d.camera.zoom *= 1.2;
        }
        
        function zoomOut() {
            viz3d.camera.zoom *= 0.8;
        }
        
        function rotate() {
            viz3d.camera.x += 45;
        }
        
        function resetView() {
            viz3d.camera = { x: 0, y: 0, z: -500, zoom: 1 };
        }
        
        function toggleAnimation() {
            viz3d.animation.enabled = !viz3d.animation.enabled;
        }
        
        // Initialize visualization
        window.addEventListener('load', () => {
            viz3d = new Visualization3D();
        });
        
        // Global functions for WebView integration
        function init3DViewer() {
            console.log('3D Viewer initialized');
        }
        
        function connectWebSocket() {
            console.log('WebSocket connected from 3D viewer');
        }
        
        function disconnectWebSocket() {
            console.log('WebSocket disconnected from 3D viewer');
        }
        
        function zoomIn() {
            viz3d.zoomIn();
        }
        
        function zoomOut() {
            viz3d.zoomOut();
        }
        
        function rotate() {
            viz3d.rotate();
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
