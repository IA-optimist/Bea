name: orchestrate_mobile
description: Mobile app for orchestrate-cli with real-time 3D visualization
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_socket_io: ^0.6.0
  web_socket_channel: ^2.4.0
  http: ^1.1.0
  provider: ^6.0.5
  flutter_riverpod: ^2.4.9
  json_annotation: ^4.8.1
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^16.3.0
  connectivity_plus: ^5.0.2
  url_launcher: ^6.1.12
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.0
  flutter_3d_controller: ^1.0.0
  webview_flutter: ^4.4.2
  intl: ^0.18.1
  logger: ^2.0.2+1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/3d/
    - assets/config/
    
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700