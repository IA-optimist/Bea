name: Build BeaMax APK

# ──────────────────────────────────────────────────────────────
# Triggered by:
#   - Tag push matching v*       → full release build + artifact
#   - Manual dispatch            → on-demand build (any branch)
#   - Push to main touching the Flutter app → smoke build (no artifact upload)
#
# Secrets consumed (configure in repo → Settings → Secrets and variables → Actions):
#   Required for a usable APK :
#     BEA_API_TOKEN   — current value from /root/Beamax-master/.env on VPS1
#     BEA_API_HOST    — e.g. bea.beamaxapp.co.uk
#     BEA_API_PORT    — e.g. 443
#     BEA_USERNAME    — e.g. admin
#
#   Optional (release signing; if absent, APK is unsigned) :
#     ANDROID_KEYSTORE_BASE64  — base64 of your .jks/.keystore
#     KEYSTORE_PASSWORD        — keystore password
#     KEY_ALIAS                — key alias in the keystore
#     KEY_PASSWORD             — key password
# ──────────────────────────────────────────────────────────────

# flutter_apk.yml
# PR trigger: runs pub-get + /api/v1 gate only (no full build, no secrets needed).
# Full build: workflow_dispatch only (requires secrets for dart-define).
on:
  pull_request:
    branches: [main]
    paths:
      - 'beamax_app/**'
      - '.github/workflows/flutter_apk.yml'
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: beamax_app

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Show Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      # ── Gate: no active /api/v1 calls allowed in Flutter client ──
      - name: Check no /api/v1 calls in lib/
        shell: bash
        run: |
          set -euo pipefail
          hits=$(grep -r "/api/v1" lib/ | grep -v "allowlist\|_V1_ALLOWLIST\|//" | wc -l || echo 0)
          echo "Active /api/v1 calls: $hits"
          if [ "$hits" -gt "0" ]; then
            echo "ERROR: Found active /api/v1 calls in Flutter client (must use /api/v3):"
            grep -rn "/api/v1" lib/ | grep -v "allowlist\|_V1_ALLOWLIST\|//"
            exit 1
          fi
          echo "OK: Flutter client uses /api/v3 only"

      # ── Skip full build on pull_request (no secrets available) ──
      - name: Skip full build on PR
        if: github.event_name == 'pull_request'
        run: echo "PR check complete — full APK build skipped (requires secrets, use workflow_dispatch)"

      # ── Full build steps: skipped on pull_request (no secrets available) ──

      # ── Optional: decode keystore for signing ────────────────
      - name: Decode keystore (if provided)
        if: github.event_name != 'pull_request' && env.ANDROID_KEYSTORE_BASE64 != ''
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF
          echo "signing=true" >> "$GITHUB_OUTPUT"

      # ── Determine build mode ─────────────────────────────────
      - name: Determine build mode
        if: github.event_name != 'pull_request'
        id: mode
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MODE="${{ inputs.build_mode }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            MODE="release"
          else
            MODE="debug"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Building in $MODE mode"

      # ── Build APK with injected secrets ──────────────────────
      - name: Build APK
        if: github.event_name != 'pull_request'
        env:
          BEA_API_TOKEN: ${{ secrets.BEA_API_TOKEN }}
          BEA_API_HOST: ${{ secrets.BEA_API_HOST }}
          BEA_API_PORT: ${{ secrets.BEA_API_PORT }}
          BEA_USERNAME: ${{ secrets.BEA_USERNAME }}
        run: |
          set -euo pipefail
          flutter build apk --${{ steps.mode.outputs.mode }} --no-shrink \
            --dart-define=BEA_API_TOKEN="${BEA_API_TOKEN:-CHANGE_ME}" \
            --dart-define=BEA_API_HOST="${BEA_API_HOST:-127.0.0.1}" \
            --dart-define=BEA_API_PORT="${BEA_API_PORT:-8000}" \
            --dart-define=BEA_USERNAME="${BEA_USERNAME:-admin}" \
            --dart-define=BEA_AUTO_LOGIN=true

      - name: Compute APK metadata
        if: github.event_name != 'pull_request'
        id: apk
        run: |
          set -euo pipefail
          APK_PATH="build/app/outputs/flutter-apk/app-${{ steps.mode.outputs.mode }}.apk"
          if [[ ! -f "$APK_PATH" ]]; then
            echo "APK not found at $APK_PATH"
            ls -la build/app/outputs/flutter-apk/ || true
            exit 1
          fi
          SIZE=$(du -h "$APK_PATH" | cut -f1)
          SHA=$(sha256sum "$APK_PATH" | cut -d' ' -f1)
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "APK ready : $APK_PATH ($SIZE, sha256=$SHA)"

      # ── Upload APK as workflow artifact (retained 90 days) ───
      - name: Upload APK artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: beamax-${{ steps.mode.outputs.mode }}-${{ github.sha }}
          path: beamax_app/${{ steps.apk.outputs.path }}
          retention-days: 90
          if-no-files-found: error

      # ── Attach APK to a GitHub Release when triggered by tag ─
      - name: Create GitHub Release (on tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: beamax_app/${{ steps.apk.outputs.path }}
          name: BeaMax ${{ github.ref_name }}
          body: |
            ## BeaMax Mobile — ${{ github.ref_name }}

            - APK : `app-${{ steps.mode.outputs.mode }}.apk` (${{ steps.apk.outputs.size }})
            - SHA-256 : `${{ steps.apk.outputs.sha256 }}`
            - Signé : ${{ steps.keystore.outputs.signing == 'true' && 'oui' || 'non (APK non-signé)' }}

            Installer via ADB :
            ```bash
            adb install app-${{ steps.mode.outputs.mode }}.apk
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
