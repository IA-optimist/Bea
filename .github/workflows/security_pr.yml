name: Security PR Gate

# Fast security checks on every PR — must pass before merge.
# Targets: ruff lint, bandit SAST, pip-audit supply-chain, security unit tests.
# Kept intentionally lean (<3 min) to avoid blocking PR iteration speed.
on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit pip-audit
          pip install structlog pydantic fastapi httpx pytest pytest-asyncio pytest-timeout

      - name: Lint (ruff — blocking on errors)
        run: ruff check . --select E,W,F --ignore E501,F401,F811,W291,W293,E402,E701,E702,E741

      - name: SAST (bandit — HIGH severity blocks)
        run: |
          bandit -r core/ api/ kernel/ -ll -q \
            --skip B101,B601,B602,B603,B607 \
            --exclude tests/

      - name: Supply-chain audit (pip-audit delta gate)
        run: |
          pip-audit -r requirements.txt --format json --output audit.json --strict || true
          python scripts/check_pip_audit_baseline.py audit.json quality/pip-audit-baseline.json

      - name: Security unit tests
        run: |
          pip install sentence-transformers langchain langchain-core langchain-openai qdrant-client || true
          pytest tests/test_security_sandbox.py tests/test_security_paths.py \
            -v --tb=short --timeout=30 -x \
            || pytest tests/test_security_sandbox.py tests/test_security_paths.py \
               -v --tb=short --timeout=30 -x -k "not docker and not sandbox_exec"

      - name: Critical wiring tests
        run: |
          pytest tests/test_critical_wiring.py -v --tb=short --timeout=30 -x
