name: JarvisMax Production Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VPS_HOST: 77.42.40.146
  VPS_USER: root
  DEPLOY_PATH: /root/.openclaw/workspace/Jarvismax-master
  CONTAINER_NAME: jarvis_core
  DOMAIN: jarvis.jarvismaxapp.co.uk

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts
      
      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST << 'EOFREMOTE'
            set -e
            
            echo "🚀 Starting deployment..."
            
            # Navigate to repo
            cd ${{ env.DEPLOY_PATH }}
            
            # Pull latest
            echo "📥 Pulling latest code..."
            git pull origin main
            
            # Backup current container state
            echo "💾 Backing up current state..."
            docker commit ${{ env.CONTAINER_NAME }} jarvismax_backup:$(date +%Y%m%d_%H%M%S)
            
            # Restart container (uses volume mount, no rebuild needed)
            echo "🔄 Restarting container..."
            docker restart ${{ env.CONTAINER_NAME }}
            
            # Wait for health
            echo "⏳ Waiting for health check..."
            sleep 15
            
            # Health check
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
              echo "✅ Deployment successful!"
              docker logs ${{ env.CONTAINER_NAME }} --tail 20
            else
              echo "❌ Health check failed!"
              echo "🔙 Rolling back..."
              
              # Get last backup
              LAST_BACKUP=$(docker images jarvismax_backup --format "{{.Repository}}:{{.Tag}}" | head -1)
              docker stop ${{ env.CONTAINER_NAME }}
              docker run -d --name ${{ env.CONTAINER_NAME }}_rollback \
                --volumes-from ${{ env.CONTAINER_NAME }} \
                $LAST_BACKUP
              
              exit 1
            fi
          EOFREMOTE
      
      - name: Notify deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deployment succeeded"
          else
            echo "❌ Deployment failed"
          fi

  test:
    needs: deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Run smoke tests
        run: |
          # Test health endpoint
          curl -f https://jarvis.jarvismaxapp.co.uk/health || exit 1
          
          # Test chat endpoint (basic)
          curl -f -X POST https://jarvis.jarvismaxapp.co.uk/api/v3/chat \
            -H "Content-Type: application/json" \
            -H "X-Jarvis-Token: ${{ secrets.JARVIS_API_TOKEN }}" \
            -d '{"message":"test","project_id":1}' || exit 1
          
          echo "✅ Smoke tests passed"
