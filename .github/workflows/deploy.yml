name: Auto Deploy to VPS1

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: root
  DEPLOY_PATH: /root/Jarvismax-master
  CONTAINER_NAME: jarvis_core
  DOMAIN: jarvis.jarvismaxapp.co.uk

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS1_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to VPS1
        id: deploy
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.VPS_USER }}@${{ env.VPS_HOST }} << 'ENDSSH'
            set -e
            
            echo "=== Starting deployment ==="
            cd ${{ env.DEPLOY_PATH }} || exit 1
            
            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main
            
            echo "=== Rebuilding Docker image (canonical non-root) ==="
            docker build -t jarvismax:latest -f docker/Dockerfile .

            echo "=== Stopping old container ==="
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true

            echo "=== Starting new container ==="
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -v /root/jarvismax-data:/app/data \
              -v /root/Jarvismax-master/.env:/app/.env:ro \
              -p 8000:8000 \
              jarvismax:latest
            
            echo "=== Waiting for container to be healthy ==="
            sleep 15
            
            echo "=== Container status ==="
            docker ps | grep ${{ env.CONTAINER_NAME }}
            
            echo "=== Deployment complete ==="
          ENDSSH
        continue-on-error: false
      
      - name: Run smoke tests
        id: smoke_test
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.VPS_USER }}@${{ env.VPS_HOST }} << 'ENDSSH'
            set -e
            
            echo "=== Running smoke tests ==="
            
            # Test 1: Container is running
            if ! docker ps | grep -q ${{ env.CONTAINER_NAME }}; then
              echo "ERROR: ${{ env.CONTAINER_NAME }} container is not running"
              exit 1
            fi
            echo "✓ Container is running"
            
            # Test 2: Container logs show no immediate errors
            sleep 5
            if docker logs ${{ env.CONTAINER_NAME }} --tail 50 2>&1 | grep -iE "error|fatal|exception|traceback" | grep -v "No error" | grep -v "0 errors"; then
              echo "WARNING: Errors detected in container logs"
              docker logs ${{ env.CONTAINER_NAME }} --tail 100
            else
              echo "✓ No critical errors in logs"
            fi
            
            # Test 3: Health check via HTTP
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "✓ Health endpoint responding at :8000"
            elif curl -sf http://localhost:8000/api/v2/health > /dev/null 2>&1; then
              echo "✓ Health endpoint responding at :8000/api/v2/health"
            else
              echo "NOTE: Health endpoint check skipped (may not be exposed)"
            fi
            
            # Test 4: Check if port 8000 is listening
            if netstat -tuln | grep -q ":8000 "; then
              echo "✓ Port 8000 is listening"
            else
              echo "WARNING: Port 8000 not listening"
            fi
            
            echo "=== Smoke tests passed ==="
          ENDSSH
        continue-on-error: false
      
      - name: Notify Telegram on failure
        if: failure()
        run: |
          TELEGRAM_MESSAGE="🚨 Deployment Failed
          
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          Workflow: ${{ github.workflow }}
          
          Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${TELEGRAM_MESSAGE}" \
            -d parse_mode="HTML"
      
      - name: Notify Telegram on success
        if: success()
        run: |
          TELEGRAM_MESSAGE="✅ Deployment Successful
          
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          
          🌐 Jarvis is now live at ${{ env.DOMAIN }}"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${TELEGRAM_MESSAGE}" \
            -d parse_mode="HTML"
