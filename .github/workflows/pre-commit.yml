name: Security — Pre-commit Hooks

# Auto-triggers disabled 2026-05-30 — see ci.yml header for rationale.
# Pre-commit hooks still run locally on every commit via
# `.pre-commit-config.yaml` (install with `pre-commit install`).
on:
  workflow_dispatch:
  # push:
  #   branches: ["**"]
  # pull_request:
  #   branches: [main, develop]

jobs:
  pre-commit:
    name: detect-secrets + gitleaks + safety nets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (fetch-depth 0 pour que gitleaks voie tout le diff)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit hook environments
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Run all pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure
