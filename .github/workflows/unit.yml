name: Unit Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  unit:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install structlog pydantic fastapi httpx pytest pytest-asyncio
          pip install sentence-transformers langchain langchain-core langchain-openai
          pip install qdrant-client || true
          pip install ruff
      
      - name: Lint (non-blocking)
        run: ruff check . --exit-zero --select E,W,F --ignore E501,F401,F811
      
      - name: Test kernel evaluation scorer
        run: |
          python -c "from kernel.evaluation.scorer import KernelScore, KernelEvaluator, get_evaluator; print('kernel.evaluation.scorer importable')"
