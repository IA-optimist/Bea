name: Unit Tests

# Auto-triggers disabled 2026-05-30 — see ci.yml header for rationale.
on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  unit:
    # Audit S7 (2026-05-19): added Windows runner to catch the
    # path-separator drifts (CRLF/LF, backslash filenames) that bit us
    # during the audit's pre-commit baseline regeneration. Linux stays the
    # primary platform; Windows is informational unless it starts catching
    # real regressions.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-xdist pytest-timeout ruff
      
      - name: Lint
        run: ruff check .
      
      - name: Tests
        env:
          DATABASE_URL: postgresql://localhost:5432/beamax_test
          REDIS_URL: redis://localhost:6379
          TESTING: true
        run: python -m pytest tests -q -m "not integration and not stale" -n auto --dist=loadfile
