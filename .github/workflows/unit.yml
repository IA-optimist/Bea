name: Unit Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  unit:
    # Audit S7 (2026-05-19): added Windows runner to catch the
    # path-separator drifts (CRLF/LF, backslash filenames) that bit us
    # during the audit's pre-commit baseline regeneration. Linux stays the
    # primary platform; Windows is informational unless it starts catching
    # real regressions.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c  # v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install structlog pydantic fastapi httpx pytest pytest-asyncio
          pip install sentence-transformers langchain langchain-core langchain-openai
          pip install qdrant-client || true
          pip install ruff
      
      - name: Lint (non-blocking)
        run: ruff check . --exit-zero --select E,W,F --ignore E501,F401,F811
      
      - name: Test kernel evaluation scorer
        run: |
          python -c "from kernel.evaluation.scorer import KernelScore, KernelEvaluator, get_evaluator; print('kernel.evaluation.scorer importable')"
