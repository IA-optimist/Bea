name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jarvismax_test
          POSTGRES_USER: jarvis
          POSTGRES_PASSWORD: test123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run linting
        run: |
          pip install ruff
          ruff check . --exit-zero
      
      - name: Run type checking
        continue-on-error: true
        run: |
          pip install mypy
          mypy core/ --ignore-missing-imports
      
      - name: Run tests
        env:
          DATABASE_URL: postgresql://jarvis:test123@localhost:5432/jarvismax_test
          REDIS_URL: redis://localhost:6379
          TESTING: true
        run: |
          pytest tests/ -v --cov=core --cov-report=xml --cov-report=term
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          docker build -t jarvismax-api:latest .
      
      - name: Test Docker image
        run: |
          docker run -d --name test-api -e DATABASE_URL=sqlite:///test.db jarvismax-api:latest
          sleep 15
          docker logs test-api
          docker stop test-api || true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to VPS1
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS1_HOST }}
          username: ${{ secrets.VPS1_USER }}
          key: ${{ secrets.VPS1_SSH_KEY }}
          script: |
            # Créer backup avant déploiement
            timestamp=$(date +%Y%m%d_%H%M%S)
            
            # Setup directory structure
            mkdir -p /opt/jarvismax-v2
            cd /opt/jarvismax-v2
            
            # Clone ou pull
            if [ -d ".git" ]; then
              echo "📥 Pulling latest changes..."
              git fetch origin
              git reset --hard origin/main
            else
              echo "📦 Cloning repository..."
              git clone https://github.com/UniTy01/Jarvismax-master.git .
            fi
            
            # Create .env if not exists
            if [ ! -f .env ]; then
              echo "🔐 Creating .env file..."
              cat > .env << 'EOF'
            POSTGRES_PASSWORD=jarvismax2025
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            EOF
            fi
            
            # Deploy with docker-compose
            echo "🚀 Deploying stack..."
            docker-compose down || true
            docker-compose pull
            docker-compose up -d --build
            
            # Wait for health checks
            echo "⏳ Waiting for services..."
            sleep 30
            
            # Verify deployment
            echo "✅ Service status:"
            docker-compose ps
            
            # Test API health
            echo "🏥 Testing API health..."
            curl -f http://localhost:8000/api/v2/health || echo "⚠️  API health check failed"
            
            echo "✅ Deployment complete!"
