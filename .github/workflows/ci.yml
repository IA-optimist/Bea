name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  secret-scan:
    name: Gitleaks (full history scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Install + run gitleaks on full history
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --config=.gitleaks.toml --no-banner --redact --verbose

  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jarvismax_test
          POSTGRES_USER: jarvis
          POSTGRES_PASSWORD: test123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-xdist
      
      - name: Run linting (ruff, blocking on curated rule set)
        run: |
          pip install ruff==0.15.8
          ruff check .

      - name: Run tests with coverage gate
        env:
          DATABASE_URL: postgresql://jarvis:test123@localhost:5432/jarvismax_test
          REDIS_URL: redis://localhost:6379
          TESTING: true
        run: |
          # Coverage threshold = conservative baseline ; raise gradually as
          # cleanup PRs land. Fails CI if core/ coverage drops below.
          # 50 → 55 (audit Sprint 4 §6.4). A bump to 60 was attempted in
          # Sprint 7 tour 1 (commit 6f5f5af) but reality is 56.98% so we
          # held at 55. Roadmap : add tests for the 0%-coverage modules
          # (workspace_cleaner, low-coverage workflow_runtime/workflow_playbooks
          # branches) before the next ratchet.
          # -n auto runs one worker per CPU core (pytest-xdist) — local suite
          # time drops from ~6.5min single-threaded to ~2min on a 4-core runner.
          pytest tests/ -v -n auto --dist=loadfile \
            --cov=core --cov-report=xml --cov-report=term \
            --cov-fail-under=55
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@ab904c41d6ece82784817410c45d8b8c02684457  # v3
        continue-on-error: true
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # Audit S8 (2026-05-20): mypy moved out of the test job into its own
  # informational job. It's still continue-on-error at the job level (so it
  # doesn't gate the green CI badge), but the run shows up cleanly in the
  # Actions summary and the conclusion turns into a single signal you can
  # watch over time. Long-term goal: turn off continue-on-error once
  # `mypy core/` reaches < 10 errors with a baseline file.
  mypy:
    name: mypy (informational, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install minimal deps for type checking
        run: |
          python -m pip install --upgrade pip
          pip install mypy structlog pydantic fastapi pydantic-settings

      - name: Run mypy on core/
        run: mypy core/ --ignore-missing-imports

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      
      - name: Build Docker image
        run: |
          docker build -t jarvismax-api:latest .
      
      - name: Test Docker image
        run: |
          docker run -d --name test-api -e DATABASE_URL=sqlite:///test.db jarvismax-api:latest
          sleep 15
          docker logs test-api
          docker stop test-api || true
