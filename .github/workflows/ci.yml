name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jarvismax_test
          POSTGRES_USER: jarvis
          POSTGRES_PASSWORD: test123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-xdist
      
      - name: Run linting (ruff, blocking on curated rule set)
        run: |
          pip install ruff==0.15.8
          ruff check .
      
      - name: Run type checking
        continue-on-error: true
        run: |
          pip install mypy
          mypy core/ --ignore-missing-imports
      
      - name: Run tests with coverage gate
        env:
          DATABASE_URL: postgresql://jarvis:test123@localhost:5432/jarvismax_test
          REDIS_URL: redis://localhost:6379
          TESTING: true
        run: |
          # Coverage threshold = conservative baseline ; raise gradually as
          # cleanup PRs land. Fails CI if core/ coverage drops below.
          # -n auto runs one worker per CPU core (pytest-xdist) — local suite
          # time drops from ~6.5min single-threaded to ~2min on a 4-core runner.
          pytest tests/ -v -n auto --dist=loadfile \
            --cov=core --cov-report=xml --cov-report=term \
            --cov-fail-under=50
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          docker build -t jarvismax-api:latest .
      
      - name: Test Docker image
        run: |
          docker run -d --name test-api -e DATABASE_URL=sqlite:///test.db jarvismax-api:latest
          sleep 15
          docker logs test-api
          docker stop test-api || true
