name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  secret-scan:
    name: Gitleaks (full history scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Install + run gitleaks on full history
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --config=.gitleaks.toml --no-banner --redact --verbose

  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jarvismax_test
          POSTGRES_USER: jarvis
          POSTGRES_PASSWORD: test123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-xdist
      
      - name: Check requirements lock drift
        run: python scripts/check_requirements_lock.py requirements.txt requirements.lock

      - name: Run linting (ruff, blocking on curated rule set)
        run: |
          pip install ruff==0.15.8
          ruff check .

      - name: Run tests with coverage gate
        env:
          DATABASE_URL: postgresql://jarvis:test123@localhost:5432/jarvismax_test
          REDIS_URL: redis://localhost:6379
          TESTING: true
        run: |
          # Coverage threshold = broad baseline across core/api/kernel.
          # Keep this ratcheted upward as uncovered modules get tests; do not
          # narrow --cov back to core-only.
          COVERAGE_FAIL_UNDER="${COVERAGE_FAIL_UNDER:-45}"
          pytest tests/ -v -n auto --dist=loadfile \
            --cov=core --cov=api --cov=kernel --cov-report=xml --cov-report=term \
            --cov-fail-under="$COVERAGE_FAIL_UNDER"
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@ab904c41d6ece82784817410c45d8b8c02684457  # v3
        continue-on-error: true
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # M6: mypy is blocking through a delta baseline. The job allows the
  # current legacy error budget, but fails if the count increases.
  mypy:
    name: mypy (delta gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install minimal deps for type checking
        run: |
          python -m pip install --upgrade pip
          pip install mypy structlog pydantic fastapi pydantic-settings

      - name: Run mypy delta gate on core/api/kernel
        run: |
          set +e
          mypy core api kernel --ignore-missing-imports --show-error-codes > mypy-report.txt
          set -e
          cat mypy-report.txt
          python scripts/check_mypy_baseline.py mypy-report.txt quality/mypy-baseline.json

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      
      - name: Build Docker image
        run: |
          docker build -t jarvismax-api:latest -f docker/Dockerfile .
      
      - name: Test Docker image
        # Hardening (audit Mi4): le step précédent se contentait d'un `sleep 15`
        # suivi de `docker logs` — il ne validait pas que l'API répond. Ici on
        # poll `/health` activement avec timeout court, et le step échoue si le
        # container ne devient pas healthy. La verbose-log reste affichée pour
        # debug en cas d'échec.
        run: |
          set -e
          docker run -d --name test-api -p 8000:8000 \
            -e DATABASE_URL=sqlite:///test.db \
            jarvismax-api:latest
          # Wait up to 60s for /health to respond 200
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health > /dev/null 2>&1; then
              ok=1
              echo "API healthy after ${i}x2=$((i*2))s"
              break
            fi
            sleep 2
          done
          docker logs test-api
          docker stop test-api || true
          docker rm test-api || true
          if [ "$ok" != "1" ]; then
            echo "::error::Docker image did not become healthy within 60s"
            exit 1
          fi
