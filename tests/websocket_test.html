<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeaMax WebSocket Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }
        
        .status.connected {
            background: #10b981;
            color: white;
        }
        
        .status.connecting {
            background: #f59e0b;
            color: white;
        }
        
        .status.disconnected {
            background: #ef4444;
            color: white;
        }
        
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: white;
        }
        
        .status.connected .status-indicator {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .controls {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
            transition: all 0.3s;
        }
        
        .button.connect {
            background: #10b981;
            color: white;
        }
        
        .button.disconnect {
            background: #ef4444;
            color: white;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .input {
            padding: 10px;
            border: 2px solid #e5e7eb;
            border-radius: 5px;
            font-size: 14px;
            width: 400px;
            margin-right: 10px;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .metric-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .metric-card h3 {
            color: #6b7280;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }
        
        .metric-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f3f4f6;
        }
        
        .metric-item:last-child {
            border-bottom: none;
        }
        
        .metric-label {
            color: #6b7280;
            font-size: 14px;
        }
        
        .metric-value {
            color: #111827;
            font-weight: 700;
            font-size: 18px;
        }
        
        .log {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .log h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .log-content {
            background: #1f2937;
            color: #10b981;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 15px;
            border-radius: 5px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .log-line {
            margin-bottom: 5px;
            white-space: pre-wrap;
        }
        
        .timestamp {
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 BeaMax WebSocket Test</h1>
            <div id="status" class="status disconnected">
                <div class="status-indicator"></div>
                <span>Disconnected</span>
            </div>
        </div>
        
        <div class="controls">
            <input 
                type="text" 
                id="wsUrl" 
                class="input" 
                value="ws://localhost:8000/ws/metrics?interval=2"
                placeholder="WebSocket URL"
            >
            <button id="connectBtn" class="button connect" onclick="connect()">Connect</button>
            <button id="disconnectBtn" class="button disconnect" onclick="disconnect()" disabled>Disconnect</button>
            <button class="button" onclick="clearLog()">Clear Log</button>
        </div>
        
        <div class="metrics-grid">
            <div class="metric-card">
                <h3>System Metrics</h3>
                <div class="metric-item">
                    <span class="metric-label">CPU Usage</span>
                    <span class="metric-value" id="cpu">--</span>
                </div>
                <div class="metric-item">
                    <span class="metric-label">Memory Usage</span>
                    <span class="metric-value" id="memory">--</span>
                </div>
                <div class="metric-item">
                    <span class="metric-label">Memory Used</span>
                    <span class="metric-value" id="memoryUsed">--</span>
                </div>
            </div>
            
            <div class="metric-card">
                <h3>Mission Stats</h3>
                <div class="metric-item">
                    <span class="metric-label">Total</span>
                    <span class="metric-value" id="missionTotal">--</span>
                </div>
                <div class="metric-item">
                    <span class="metric-label">Approved</span>
                    <span class="metric-value" id="missionApproved">--</span>
                </div>
                <div class="metric-item">
                    <span class="metric-label">Completed</span>
                    <span class="metric-value" id="missionDone">--</span>
                </div>
                <div class="metric-item">
                    <span class="metric-label">Pending</span>
                    <span class="metric-value" id="missionPending">--</span>
                </div>
            </div>
            
            <div class="metric-card">
                <h3>Revenue Metrics</h3>
                <div class="metric-item">
                    <span class="metric-label">MRR</span>
                    <span class="metric-value" id="mrr">--</span>
                </div>
                <div class="metric-item">
                    <span class="metric-label">ARR</span>
                    <span class="metric-value" id="arr">--</span>
                </div>
                <div class="metric-item">
                    <span class="metric-label">Daily Revenue</span>
                    <span class="metric-value" id="dailyRevenue">--</span>
                </div>
            </div>
        </div>
        
        <div class="log">
            <h3>Event Log</h3>
            <div id="log" class="log-content"></div>
        </div>
    </div>
    
    <script>
        let ws = null;
        let messageCount = 0;
        
        function updateStatus(status, text) {
            const statusEl = document.getElementById('status');
            statusEl.className = `status ${status}`;
            statusEl.querySelector('span').textContent = text;
        }
        
        function log(message, type = 'info') {
            const logEl = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
            log('Log cleared');
        }
        
        function connect() {
            const url = document.getElementById('wsUrl').value;
            
            log(`Connecting to ${url}...`);
            updateStatus('connecting', 'Connecting...');
            
            try {
                ws = new WebSocket(url);
                
                ws.onopen = () => {
                    log('✅ Connected successfully!');
                    updateStatus('connected', 'Connected');
                    document.getElementById('connectBtn').disabled = true;
                    document.getElementById('disconnectBtn').disabled = false;
                    messageCount = 0;
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        messageCount++;
                        
                        // Update metrics
                        document.getElementById('cpu').textContent = `${data.system.cpu.toFixed(1)}%`;
                        document.getElementById('memory').textContent = `${data.system.memory.toFixed(1)}%`;
                        document.getElementById('memoryUsed').textContent = 
                            `${data.system.memory_used_gb.toFixed(2)} GB`;
                        
                        document.getElementById('missionTotal').textContent = data.missions.total;
                        document.getElementById('missionApproved').textContent = data.missions.approved;
                        document.getElementById('missionDone').textContent = data.missions.done;
                        document.getElementById('missionPending').textContent = data.missions.pending;
                        
                        document.getElementById('mrr').textContent = `$${data.revenue.mrr.toFixed(2)}`;
                        document.getElementById('arr').textContent = `$${data.revenue.arr.toFixed(2)}`;
                        document.getElementById('dailyRevenue').textContent = 
                            `$${data.revenue.daily_revenue.toFixed(2)}`;
                        
                        log(`📊 Received update #${messageCount}`);
                    } catch (e) {
                        log(`❌ Failed to parse message: ${e.message}`);
                    }
                };
                
                ws.onerror = (error) => {
                    log(`❌ WebSocket error: ${error.message || 'Unknown error'}`);
                };
                
                ws.onclose = () => {
                    log('❌ Connection closed');
                    updateStatus('disconnected', 'Disconnected');
                    document.getElementById('connectBtn').disabled = false;
                    document.getElementById('disconnectBtn').disabled = true;
                    ws = null;
                };
            } catch (e) {
                log(`❌ Connection failed: ${e.message}`);
                updateStatus('disconnected', 'Disconnected');
            }
        }
        
        function disconnect() {
            if (ws) {
                log('Disconnecting...');
                ws.close();
            }
        }
        
        // Initial log message
        log('Ready to connect. Click "Connect" to start.');
    </script>
</body>
</html>
