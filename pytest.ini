[pytest]
asyncio_mode = auto
filterwarnings =
    ignore::pytest.PytestUnknownMarkWarning
    ignore::DeprecationWarning

# Custom marks
markers =
    ui_legacy: Tests depending on static/app.html or static/cockpit.html (deprecated, moved to frontend/)
    integration: tests that require external services (Qdrant, Redis, Postgres).
                 Run with: pytest -m integration
                 Skip in fast CI with: pytest -m "not integration"
