[pytest]
asyncio_mode = auto
testpaths = tests scripts/test_*.py
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = .venv .venv-train agents gateway core api connectors executor memory scripts cron examples business data_intelligence deploy orchestrate-cli adapters kernel beamax_app
filterwarnings =
    ignore::pytest.PytestUnknownMarkWarning
    ignore:Using `httpx` with `starlette\.testclient` is deprecated; install `httpx2` instead\.

# Custom marks
markers =
    ui_legacy: Tests depending on static/app.html or static/cockpit.html (deprecated, moved to frontend/)
    integration: tests that require external services (Qdrant, Redis, Postgres).
                 Run with: pytest -m integration
                 Skip in fast CI with: pytest -m "not integration"
    quarantine: stale or drifted tests kept out of the blocking suite
