<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Jarvis — AI Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#09090b;--surface:#111113;--elevated:#18181b;--overlay:#1f1f23;--hover:#27272a;--active:#2d2d32;--b-subtle:#1f1f23;--b-default:#27272a;--b-strong:#3f3f46;--b-focus:#3b82f6;--t1:#fafafa;--t2:#a1a1aa;--t3:#71717a;--t4:#52525b;--blue:#3b82f6;--blue-s:rgba(59,130,246,.1);--green:#22c55e;--green-s:rgba(34,197,94,.1);--amber:#f59e0b;--amber-s:rgba(245,158,11,.1);--red:#ef4444;--red-s:rgba(239,68,68,.1);--violet:#8b5cf6;--violet-s:rgba(139,92,246,.1);--r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;--font:'Inter',system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:var(--font);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--b-default);border-radius:3px}
a{color:inherit;text-decoration:none}button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:var(--t1)}

/* Layout */
.shell{display:flex;height:100vh}
.sidebar{width:250px;background:var(--surface);border-right:1px solid var(--b-subtle);display:flex;flex-direction:column;flex-shrink:0;transition:transform .2s}
.sidebar-hdr{padding:20px 16px 14px;border-bottom:1px solid var(--b-subtle)}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--violet));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.brand-name{font-size:16px;font-weight:700;letter-spacing:-.3px}
.brand-sub{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 8px}
.nav-group{margin-bottom:4px}
.nav-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--t4);padding:12px 12px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--r-sm);color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;border-left:2px solid transparent;transition:all .12s}
.nav-item:hover{background:var(--hover);color:var(--t1)}
.nav-item.active{background:var(--blue-s);color:var(--blue);border-left-color:var(--blue)}
.nav-icon{width:18px;text-align:center;font-size:14px;opacity:.75}
.nav-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--amber);color:#000;margin-left:auto}
.sidebar-foot{padding:12px 16px;border-top:1px solid var(--b-subtle);font-size:11px;color:var(--t4)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-hdr{padding:14px 20px;border-bottom:1px solid var(--b-subtle);display:flex;align-items:center;gap:12px}
.main-title{font-size:16px;font-weight:700}
.main-body{flex:1;overflow-y:auto;padding:20px}
.menu-btn{display:none;font-size:20px;padding:4px 8px}

/* Cards */
.card{background:var(--surface);border:1px solid var(--b-subtle);border-radius:var(--r-md);padding:16px}
.card-header{font-size:12px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.stat{background:var(--surface);border:1px solid var(--b-subtle);border-radius:var(--r-md);padding:14px;text-align:center}
.stat-val{font-size:24px;font-weight:700;line-height:1}
.stat-lbl{font-size:11px;color:var(--t3);margin-top:4px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-done{background:var(--green-s);color:var(--green)}.badge-running{background:var(--blue-s);color:var(--blue)}
.badge-failed{background:var(--red-s);color:var(--red)}.badge-pending{background:var(--amber-s);color:var(--amber)}
.badge-planned{background:var(--violet-s);color:var(--violet)}.badge-default{background:var(--overlay);color:var(--t3)}
.badge-enabled{background:var(--green-s);color:var(--green)}.badge-disabled{background:var(--overlay);color:var(--t4)}
.badge-registered{background:var(--blue-s);color:var(--blue)}

/* Buttons */
.btn{padding:8px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:600;transition:all .12s;border:1px solid transparent}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{opacity:.9}
.btn-green{background:var(--green);color:#fff}.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:transparent;color:var(--t2);border-color:var(--b-default)}.btn-ghost:hover{background:var(--hover);color:var(--t1)}
.btn-sm{padding:4px 10px;font-size:11px}

/* Forms */
.input{width:100%;padding:10px 14px;background:var(--elevated);border:1px solid var(--b-default);border-radius:var(--r-sm);font-size:14px;color:var(--t1);outline:none}
.input:focus{border-color:var(--blue)}
.textarea{min-height:80px;resize:vertical}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;padding:8px 12px;border-bottom:1px solid var(--b-subtle)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--b-subtle);font-size:13px}
.tbl tr:hover td{background:var(--hover)}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--b-subtle);padding:0 4px;margin-bottom:16px}
.tab{padding:8px 14px;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s}
.tab:hover{color:var(--t1)}.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:12px 18px;border-radius:var(--r-sm);font-size:13px;font-weight:500;z-index:999;animation:slideUp .2s;max-width:340px}
.toast-ok{background:var(--green);color:#fff}.toast-err{background:var(--red);color:#fff}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Spinner */
.spin{width:20px;height:20px;border:2px solid var(--b-default);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--blue);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--t3)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}

/* Mission list */
.mission-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r-sm);cursor:pointer;transition:background .12s}
.mission-row:hover{background:var(--hover)}
.mission-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mission-goal{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mission-time{font-size:11px;color:var(--t4);flex-shrink:0}

/* Module card */
.mod-card{display:flex;align-items:center;gap:12px;padding:14px;background:var(--surface);border:1px solid var(--b-subtle);border-radius:var(--r-md);margin-bottom:8px}
.mod-icon{width:36px;height:36px;border-radius:var(--r-sm);background:var(--elevated);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.mod-info{flex:1;min-width:0}
.mod-name{font-size:14px;font-weight:600}
.mod-desc{font-size:12px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toggle{width:40px;height:22px;border-radius:11px;background:var(--b-default);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(18px)}

/* Detail panel */
.detail-section{margin-bottom:20px}
.detail-label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.detail-block{background:var(--elevated);border:1px solid var(--b-subtle);border-radius:var(--r-sm);padding:14px;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:400px;overflow-y:auto}
.copy-btn{font-size:11px;color:var(--t3);cursor:pointer;margin-left:8px}
.copy-btn:hover{color:var(--blue)}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)}
.login-box{width:360px;padding:40px;background:var(--surface);border:1px solid var(--b-subtle);border-radius:var(--r-lg)}
.login-brand{text-align:center;margin-bottom:32px}
.login-brand h1{font-size:28px;font-weight:700;letter-spacing:-.5px}
.login-brand p{font-size:12px;color:var(--t3);margin-top:4px}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:12px;font-weight:500;color:var(--t3);margin-bottom:4px}
.login-err{color:var(--red);font-size:12px;margin-bottom:12px}

/* Responsive */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:block}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
}

.hidden{display:none!important}
.view{display:none}.view.active{display:block}
</style>
</head>
<body>

      <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--violet));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;margin:0 auto 12px">J</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// JARVIS — Web Application (PROVEN endpoints only)
// ═══════════════════════════════════════════════════════════════════════════════

let TOKEN='',ROLE='user',MISSIONS=[],CURRENT_MOD_TAB='agents';

// ── Auth ────────────────────────────────────────────────────────────────────
// XSS-hardening : le token n'est PLUS persisté en localStorage. Le backend
// set un cookie HttpOnly `jarvis_token` (Secure, SameSite=Lax, 7 jours).
// Tous les fetch() utilisent credentials:'include' pour envoyer le cookie.
// Le token reste en mémoire uniquement pour le fallback header (legacy).

function getToken(){return TOKEN||''}
function setToken(t,r){TOKEN=t;ROLE=r||'user';}

// ── Token Refresh ───────────────────────────────────────────────────────────

let tokenRefreshInterval=null;

function decodeJWT(token){
  try{
    const parts=token.split('.');
    if(parts.length!==3)return null;
    const payload=parts[1];
    // Decode base64url (replace - with +, _ with /, and pad if needed)
    const base64=payload.replace(/-/g,'+').replace(/_/g,'/');
    const decoded=atob(base64);
    return JSON.parse(decoded);
  }catch(e){
    console.error('Failed to decode JWT:',e);
    return null;
  }
}

async function checkTokenExpiry(){
  if(!TOKEN||TOKEN==='***')return;
  
  const decoded=decodeJWT(TOKEN);
  if(!decoded||!decoded.exp)return;
  
  const now=Math.floor(Date.now()/1000);
  const expiresIn=decoded.exp-now;
  
  // If token expires in less than 10 minutes (600 seconds), refresh it
  if(expiresIn<600){
    try{
      const r=await fetch('/auth/refresh',{
        method:'POST',
        headers:{'Authorization':'Bearer '+TOKEN}
      });
      
      if(r.ok){
        const d=await r.json();
        if(d.token||d.access_token){
          const newToken=d.token||d.access_token;
          // Decode role from new token
          let role='user';
          try{
            const p=decodeJWT(newToken);
            role=p.role||'user';
          }catch(e){}
          setToken(newToken,role);
          // Silent refresh: no notification
        }
      }else if(r.status===401){
        toast('Session expirée','err');
        logout();
      }
    }catch(e){
      console.error('Token refresh failed:',e);
      toast('Erreur de rafraîchissement du token','err');
      logout();
    }
  }
}

function startTokenRefresh(){
  if(tokenRefreshInterval)clearInterval(tokenRefreshInterval);
  // Check every 5 minutes
  tokenRefreshInterval=setInterval(checkTokenExpiry,5*60*1000);
  // Also check immediately on start
  checkTokenExpiry();
}

function stopTokenRefresh(){
  if(tokenRefreshInterval){
    clearInterval(tokenRefreshInterval);
    tokenRefreshInterval=null;
  }
}

// ────────────────────────────────────────────────────────────────────────────

async function doLogin(){
  const user=document.getElementById('login-user').value.trim();
  const pass=document.getElementById('login-pass').value;
  const tok=document.getElementById('login-token').value.trim();
  const errEl=document.getElementById('login-err');
  errEl.classList.add('hidden');

  if(tok){
    // Static token login — test against real endpoint (+ cookie auto si supported)
    try{
      const r=await fetch('/api/v3/system/status',{headers:{'X-Jarvis-Token':tok},credentials:'include'});
      if(r.ok){setToken(tok,'admin');enterApp();return}
    }catch(e){}
    errEl.textContent='Token invalide';errEl.classList.remove('hidden');return;
  }
  if(!user||!pass){errEl.textContent='Remplissez les champs';errEl.classList.remove('hidden');return}
  try{
    // JSON endpoint qui set aussi le cookie HttpOnly jarvis_token.
    // credentials:'include' pour stocker le cookie dans le navigateur.
    const r=await fetch('/api/v2/auth/login',{
      method:'POST',
      credentials:'include',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:user,password:pass})
    });
    const d=await r.json();
    if(r.ok && d.ok && d.data && d.data.token){
      // JWT login: decode role from token payload
      let role='user';
      try{const p=JSON.parse(atob(d.data.token.split('.')[1]));role=p.role||'user'}catch(e){}
      // Token gardé en mémoire (fallback header pour WebSocket qui ne supporte
      // pas les cookies). Pas de localStorage — le cookie HttpOnly gère la session.
      setToken(d.data.token,role);enterApp();
    }else{errEl.textContent=d.detail||d.error||'Identifiants incorrects';errEl.classList.remove('hidden')}
  }catch(e){errEl.textContent='Erreur de connexion au serveur';errEl.classList.remove('hidden')}
}

async function logout(){
  stopTokenRefresh();
  try{
    // Serveur clear le cookie HttpOnly.
    await fetch('/api/v2/auth/logout',{method:'POST',credentials:'include'});
  }catch(e){}
  localStorage.clear();
  TOKEN='***';
  location.reload();
}

function enterApp(){
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  if(ROLE==='admin')document.getElementById('nav-admin-group').classList.remove('hidden');
  document.getElementById('foot-role').textContent=ROLE==='admin'?'Administrateur':'Utilisateur';
  document.getElementById('set-role').textContent=ROLE==='admin'?'ADMIN':'USER';
  document.getElementById('set-server').textContent=location.host;
  document.getElementById('status-dot').style.background='var(--green)';
  startTokenRefresh();
  initHome();
}

// Check saved session — via cookie HttpOnly (plus de localStorage).
// On pingue un endpoint auth-gated ; si 200, la session est encore valide
// et on entre directement dans l'app sans token en mémoire. Les requêtes
// futures partent avec credentials:'include' → cookie fait l'auth.
(async function(){
  try{
    const r=await fetch('/api/v2/status',{credentials:'include'});
    if(r.ok){
      // Session valide via cookie. On déduit le role depuis un endpoint
      // dédié (fallback user si indispo).
      let role='user';
      try{
        const me=await fetch('/auth/me',{credentials:'include'});
        if(me.ok){const d=await me.json();role=d.role||d.data?.role||'user';}
      }catch(e){}
      TOKEN='';
      ROLE=role;
      enterApp();
    }
  }catch(e){/* no session, show login */}
})();

// ── API helper ──────────────────────────────────────────────────────────────

async function api(path,opts={}){
  // credentials:'include' → envoie le cookie HttpOnly jarvis_token.
  // Headers maintenus comme fallback legacy (WebSocket, tests).
  const h={};
  if(TOKEN){h['X-Jarvis-Token']=TOKEN;h['Authorization']='Bearer '+TOKEN;}
  if(opts.body)h['Content-Type']='application/json';
  opts.credentials=opts.credentials||'include';
  try{
    const r=await fetch(path,{...opts,headers:{...h,...(opts.headers||{})}});
    if(r.status===401){toast('Session expirée','err');logout();return null}
    return await r.json();
  }catch(e){return null}
}

    if(pending.length>0){

async function submitMission(){
  const input=document.getElementById('home-input');

  if(!text){toast('Décrivez votre mission','err');return}
  const goal=type?`[${type}] ${text}`:text;

  btn.disabled=true;btn.textContent='Envoi…';
  const r=await api('/api/v3/missions',{method:'POST',body:JSON.stringify({goal:goal,mode:'auto'})});

// ── Missions ────────────────────────────────────────────────────────────────

let MISSIONS_OFFSET = 0;
let MISSIONS_HAS_MORE = true;

async function loadMissions(loadMore = false){
  if (!loadMore) {
    MISSIONS_OFFSET = 0;
    MISSIONS_HAS_MORE = true;
    document.getElementById('mission-list').innerHTML='<div class="spin"></div>';
  }
  
  const d=await api(`/api/v3/missions?limit=50&offset=${MISSIONS_OFFSET}`);
  if(d&&d.data&&d.data.missions){
    if (loadMore) {
      MISSIONS = MISSIONS.concat(d.data.missions);
    } else {
      MISSIONS = d.data.missions;
    }
    MISSIONS_HAS_MORE = d.data.missions.length >= 50;
    MISSIONS_OFFSET += d.data.missions.length;
    renderMissions();
  }
  else{document.getElementById('mission-list').innerHTML='<div class="empty"><div class="empty-icon">🚀</div>Impossible de charger les missions</div>'}
}

function renderMissions(){
  const search=(document.getElementById('m-search').value||'').toLowerCase();
  const filter=document.getElementById('m-filter').value;
  let list=MISSIONS;
  if(search)list=list.filter(m=>(m.user_input||m.goal||'').toLowerCase().includes(search));
  if(filter)list=list.filter(m=>m.status===filter);
  if(list.length===0){
    document.getElementById('mission-list').innerHTML='<div class="empty"><div class="empty-icon">📭</div>Aucune mission trouvée</div>';
    return;
  }
  
  let html = list.map(m=>`
    <div class="mission-row" onclick="openMission('${m.mission_id}')">
      <div class="mission-dot" style="background:${dotColor(m.status)}"></div>
      <div class="mission-goal">${esc(m.user_input||m.goal||m.mission_id)}</div>
      ${statusBadge(m.status)}
      <div class="mission-time">${timeAgo(m.created_at)}</div>
    </div>`).join('');
  
  // Add pagination button if there are more missions to load (only when no filter/search active)
  if (MISSIONS_HAS_MORE && !search && !filter) {
    html += `<div class="page-actions" style="margin-top:16px;text-align:center">
      <button class="btn btn-ghost btn-sm" onclick="loadMoreMissions()" id="load-more-btn">Charger plus</button>
    </div>`;
  } else if (!MISSIONS_HAS_MORE && MISSIONS.length > 0 && !search && !filter) {
    html += `<div class="page-actions" style="margin-top:16px;text-align:center;color:var(--t3);font-size:12px">
      Toutes les missions sont chargées
    </div>`;
  }
  
  document.getElementById('mission-list').innerHTML = html;
}

async function loadMoreMissions() {
  const btn = document.getElementById('load-more-btn');
  if (btn) {
    btn.textContent = 'Chargement...';
    btn.disabled = true;
  }
  await loadMissions(true);
}

async function openMission(id){
  document.querySelectorAll('.view').forEach(p=>p.classList.remove('active'));
  document.getElementById('v-detail').classList.add('active');
  document.getElementById('main-title').textContent='Détail mission';
  document.getElementById('detail-content').innerHTML='<div class="spin"></div>';

  const d=await api('/api/v3/missions/'+id);
  if(!d||!d.data){document.getElementById('detail-content').innerHTML='<div class="empty">Mission introuvable</div>';return}
  // Real structure: d.data contains all fields directly (no d.data.mission wrapper)
  const m=d.data.mission||d.data;
  const outputs=m.agent_outputs||{};
  const isErr=m.status==='FAILED'||m.status==='REJECTED';
  const result=m.final_output||m.summary||'';
  const planSteps=m.plan_steps||[];
  const agentsList=m.agents_selected||[];
  const confidence=m.confidence_score;
  const fallback=m.fallback_level_used;
  const approvalReason=m.approval_reason||'';
  const riskLevel=m.plan_risk||'';

  let html=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap">
      ${statusBadge(m.status)}
      ${riskLevel?'<span class="badge badge-default">Risque: '+esc(riskLevel)+'</span>':''}
      ${m.intent?'<span class="badge badge-default">'+esc(m.intent)+'</span>':''}
      ${confidence!=null?'<span style="font-size:11px;color:var(--t4)">Confiance: '+Math.round(confidence*100)+'%</span>':''}
      <span style="font-size:11px;color:var(--t4)">${m.mission_id}</span>
      <span style="font-size:11px;color:var(--t4)">${timeAgo(m.created_at)}</span>
    </div>
    ${approvalReason?'<div style="font-size:12px;color:var(--t3);margin-bottom:12px;font-style:italic">'+esc(approvalReason)+'</div>':''}

    <div class="detail-section">
      <div class="detail-label">Objectif</div>
      <div class="detail-block">${esc(m.user_input||m.goal||'')}</div>
    </div>`;

  if(planSteps.length>0){
    html+=`<div class="detail-section"><div class="detail-label">Plan d'exécution (${planSteps.length} étapes)</div><div class="detail-block">`;
    planSteps.forEach((s,i)=>{
      const task=s.task||s.description||s.name||'Étape '+(i+1);
      const agent=s.agent||'';
      html+=`<div style="margin-bottom:6px"><span style="color:var(--blue);font-weight:600">${i+1}.</span> ${esc(task)}${agent?' <span style="color:var(--t4);font-size:11px">('+esc(agent)+')</span>':''}</div>`;
    });
    html+=`</div></div>`;
  }

  if(agentsList.length>0){
    html+=`<div class="detail-section"><div class="detail-label">Agents utilisés</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${agentsList.map(a=>'<span class="badge badge-default">'+esc(a)+'</span>').join('')}</div></div>`;
  }

  // agent_outputs: may be dict with content, or empty dict
  const outputEntries=Object.entries(outputs).filter(([k,v])=>v&&String(v).trim());
  if(outputEntries.length>0){
    html+=`<div class="detail-section"><div class="detail-label">Résultats par agent</div>`;
    for(const[agent,text]of outputEntries){
      html+=`<details style="margin-bottom:8px"><summary style="cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);padding:8px 0">${esc(agent)}</summary><div class="detail-block">${esc(String(text))}</div></details>`;
    }
    html+=`</div>`;
  }

  if(result){
    html+=`<div class="detail-section">
      <div class="detail-label">Résultat final <span class="copy-btn" onclick="copyText(this)" data-text="${esc(result).replace(/"/g,'&quot;')}">📋 Copier</span></div>
      <div class="detail-block" style="${isErr?'color:var(--red)':''}">${esc(result)}</div>
    </div>`;
  }

  // Execution trace — what the system tried
  const trace=m.execution_trace||[];
  if(trace.length>0){
    html+=`<div class="detail-section"><div class="detail-label">Trace d'exécution</div><div class="detail-block" style="font-size:12px;color:var(--t3)">`;
    trace.forEach((t,i)=>{
      const ev=t.event||t.type||'step';
      const detail=t.detail||t.message||t.output||JSON.stringify(t).substring(0,120);
      html+=`<div style="margin-bottom:4px"><span style="color:var(--t4)">${i+1}.</span> <span style="color:var(--blue)">${esc(ev)}</span> ${esc(String(detail).substring(0,200))}</div>`;
    });
    html+=`</div></div>`;
  }

  // Error with context
  if(m.error){
    html+=`<div class="detail-section"><div class="detail-label" style="color:var(--red)">❌ Erreur</div><div class="detail-block" style="color:var(--red);border-color:rgba(239,68,68,.2)">
      <div style="margin-bottom:8px">${esc(m.error)}</div>
      ${fallback!=null?'<div style="font-size:11px;color:var(--t3)">Niveau de fallback utilisé : '+fallback+'</div>':''}
      ${m.skipped_agents?.length?'<div style="font-size:11px;color:var(--t3);margin-top:4px">Agents ignorés : '+m.skipped_agents.map(a=>esc(a)).join(', ')+'</div>':''}
    </div></div>`;
  }

  if(m.status==='PENDING_VALIDATION'||m.status==='AWAITING_APPROVAL'){
    html+=`<div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-green" onclick="approveMission('${m.mission_id}')">✓ Approuver</button>
      <button class="btn btn-red" onclick="rejectMission('${m.mission_id}')">✗ Rejeter</button>
    </div>`;
  }

  document.getElementById('detail-content').innerHTML=html;
}

        <div class="stat"><div class="stat-val">${ag.total||0}</div><div class="stat-lbl">Agents (${ag.ready||0} prêts)</div></div>
        <div class="stat"><div class="stat-val">${mc.total||0}</div><div class="stat-lbl">MCP (${mc.connected||0} connectés)</div></div>
        <div class="stat"><div class="stat-val">${sk.total||cn.total||0}</div><div class="stat-lbl">Skills (${sk.enabled||0} actifs)</div></div>
        <div class="stat"><div class="stat-val">${mc.zero_tools||0}</div><div class="stat-lbl">MCP sans outils</div></div>
      </div>`;
  }
  let items=[];
  if(CURRENT_MOD_TAB==='agents'){
    const d=await api('/api/v3/agents');
    items=(d?.agents||[]).map(a=>({id:a.id,name:a.name||a.id,desc:a.description||'',status:a.status||'enabled',icon:'🤖',type:'agents'}));
  }else if(CURRENT_MOD_TAB==='skills'){
    const d=await api('/api/v3/skills');
    items=(d?.skills||[]).map(s=>({id:s.id,name:s.name||s.id,desc:s.description||'',status:s.status||'enabled',icon:'🎯',type:'skills'}));
  }else if(CURRENT_MOD_TAB==='connectors'){
    const d=await api('/api/v3/connectors');
    items=(d?.connectors||[]).map(c=>({id:c.name||c.id,name:c.name||c.id,desc:c.description||'',status:c.enabled?'enabled':'disabled',icon:'🔌',type:'connectors'}));
  }else if(CURRENT_MOD_TAB==='mcp'){
    const d=await api('/api/v3/mcp');
    items=(d?.mcp||[]).map(m=>({id:m.id,name:m.name||m.id,desc:m.description||m.transport||'',status:m.status||'enabled',icon:'⚡',type:'mcp',tools:Array.isArray(m.tools)?m.tools.length:(m.tools_count||0)}));
  }
  if(items.length===0){
    document.getElementById('mod-content').innerHTML='<div class="empty"><div class="empty-icon">📦</div>Aucun module dans cette catégorie</div>';
    return;
  }
  document.getElementById('mod-content').innerHTML=items.map(m=>{
    const isOn=m.status==='enabled'||m.status==='active'||m.status==='ready';
    const badgeClass=isOn?'badge-enabled':'badge-disabled';
    const badgeLabel=isOn?'Actif':'Inactif';
    // For MCP, show "Enregistré" if enabled but 0 tools (not "Connecté")
    const realLabel=(m.type==='mcp'&&isOn&&m.tools===0)?'Enregistré':badgeLabel;
    const realClass=(m.type==='mcp'&&isOn&&m.tools===0)?'badge-registered':badgeClass;
    return`<div class="mod-card">
      <div class="mod-icon">${m.icon}</div>
      <div class="mod-info"><div class="mod-name">${esc(m.name)}</div><div class="mod-desc">${esc(m.desc)}${m.type==='mcp'?' · '+m.tools+' outil'+(m.tools!==1?'s':''):''}</div></div>
      <span class="badge ${realClass}">${realLabel}</span>
      <div class="toggle ${isOn?'on':''}" onclick="toggleModule('${m.type}','${m.id}')" title="${isOn?'Désactiver':'Activer'}"></div>
    </div>`;
  }).join('');
}

async function toggleModule(type,id){
  // Backend toggle is a flipflop — no body needed, response contains new status
  const r=await api(`/api/v3/${type}/${id}/toggle`,{method:'POST'});
  if(r){
    const newSt=r.status||'?';
    toast(newSt==='enabled'?'Activé ✓':'Désactivé');
    loadModules();
  }else{toast('Erreur lors du toggle','err')}
}

// ── System ──────────────────────────────────────────────────────────────────

async function loadSystem(){
  document.getElementById('sys-content').innerHTML='<div class="spin"></div>';
  const[health,caps]=await Promise.all([api('/api/health'),api('/api/v3/system/capabilities')]);
  let html='';
  if(health?.data){
    const comps=health.data.components||{};
    html+=`<div class="card" style="margin-bottom:16px"><div class="card-header">Composants (${Object.keys(comps).length})</div>`;
    html+=Object.entries(comps).map(([k,v])=>{
      const meta=v.metadata||{};
      let sub='';
      if(meta.model)sub=meta.model;
      else if(meta.backend)sub=meta.backend;
      else if(meta.running!==undefined)sub=meta.running?'actif':'arrêté';
      return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--b-subtle)">
        <div><span style="font-size:13px;font-weight:500">${esc(v.name||k)}</span>${sub?'<span style="font-size:11px;color:var(--t4);margin-left:8px">'+esc(sub)+'</span>':''}</div>
        <span class="badge ${v.status==='ok'?'badge-done':'badge-failed'}">${v.status||'?'}</span>
      </div>`;
    }).join('');
    if(health.data.version)html+=`<div style="font-size:11px;color:var(--t4);margin-top:8px">Version API : ${esc(health.data.version)}</div>`;
    html+=`</div>`;
  }
  if(caps&&caps.data){
    if(caps.data.tools){
      html+=`<div class="card" style="margin-bottom:16px"><div class="card-header">Outils disponibles</div>`;
      const tools=Array.isArray(caps.data.tools)?caps.data.tools:Object.entries(caps.data.tools).map(([k,v])=>({name:k,...v}));
      tools.forEach(t=>{
        html+=`<div style="padding:6px 0;border-bottom:1px solid var(--b-subtle);font-size:13px">${esc(t.name||t)}</div>`;
      });
      html+=`</div>`;
    }
  }
  document.getElementById('sys-content').innerHTML=html||'<div class="empty">Données système indisponibles</div>';
}

// ── Helpers ──────────────────────────────────────────────────────────────────

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function dotColor(st){
  const s=(st||'').toUpperCase();
  if(s==='DONE'||s==='COMPLETED')return'var(--green)';
  if(s==='RUNNING'||s==='EXECUTING')return'var(--blue)';
  if(s==='FAILED'||s==='ERROR')return'var(--red)';
  if(s==='REJECTED')return'var(--red)';
  if(s.includes('PENDING')||s.includes('APPROVAL')||s==='REVIEW')return'var(--amber)';
  if(s==='PLANNED'||s==='ANALYZING')return'var(--violet)';
  return'var(--t4)';
}

function statusBadge(st){
  const s=(st||'').toUpperCase();
  const map={DONE:'badge-done',COMPLETED:'badge-done',RUNNING:'badge-running',EXECUTING:'badge-running',FAILED:'badge-failed',ERROR:'badge-failed',REJECTED:'badge-failed',PENDING_VALIDATION:'badge-pending',AWAITING_APPROVAL:'badge-pending',REVIEW:'badge-pending',PLANNED:'badge-planned',ANALYZING:'badge-planned',CREATED:'badge-default'};
  const labels={DONE:'Terminé',COMPLETED:'Terminé',RUNNING:'En cours',EXECUTING:'En cours',FAILED:'Échoué',ERROR:'Erreur',REJECTED:'Rejeté',PENDING_VALIDATION:'En attente',AWAITING_APPROVAL:'Approbation',REVIEW:'Révision',PLANNED:'Planifié',ANALYZING:'Analyse',CREATED:'Créé'};
  return`<span class="badge ${map[s]||'badge-default'}">${labels[s]||s}</span>`;
}

function timeAgo(ts){
  if(!ts)return'';
  const d=typeof ts==='number'?(ts>1e12?new Date(ts):new Date(ts*1000)):new Date(ts);
  const diff=Date.now()-d.getTime();
  const m=Math.floor(diff/60000);
  if(m<1)return"à l'instant";if(m<60)return m+'min';
  const h=Math.floor(m/60);if(h<24)return h+'h';
  const dy=Math.floor(h/24);return dy+'j';
}

function formatUptime(s){if(!s)return'?';const h=Math.floor(s/3600);const m=Math.floor((s%3600)/60);return h>0?h+'h '+m+'m':m+'m'}

// ── Keyboard ────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.ctrlKey&&document.activeElement===document.getElementById('home-input')){submitMission()}
  // Login: Enter key submits
  if(e.key==='Enter'&&(document.activeElement===document.getElementById('login-user')||document.activeElement===document.getElementById('login-pass')||document.activeElement===document.getElementById('login-token'))){doLogin()}
});

// ── Auto-refresh on mission submit ──────────────────────────────────────────
let _pollTimer=null;
function startPoll(){if(_pollTimer)return;_pollTimer=setInterval(()=>{if(document.getElementById('v-home').classList.contains('active'))initHome()},15000)}
function stopPoll(){if(_pollTimer){clearInterval(_pollTimer);_pollTimer=null}}
// Start polling after login
const _origEnter=enterApp;
enterApp=function(){_origEnter();startPoll()};
</script>
