# Pre-commit hooks — JarvisMax
# Sécurité & détection (pas d'auto-formatage pour éviter les churns massifs).
#
# Installation locale :
#   pip install pre-commit
#   pre-commit install
#
# Exécution manuelle sur tout le repo :
#   pre-commit run --all-files

default_install_hook_types: [pre-commit]
default_stages: [pre-commit]

repos:
  # ── Secret detection ────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets (audit des nouveaux secrets)
        args:
          - --baseline
          - .secrets.baseline
        exclude: |
          (?x)^(
            \.secrets\.baseline|
            .*\.lock|
            .*/migrations/.*|
            docs/archive/.*|
            jarvismax_app/.*|
            frontend/.*|
            mobile/.*|
            .*\.min\.(js|css)|
            README\.md|
            README_EN\.md|
            ARCHITECTURE\.md|
            core/_legacy/README\.md
          )$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret scanning second layer)
        args: [--config=.gitleaks.toml]

  # ── Safety nets (détection uniquement, pas d'auto-fix) ─────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-yaml
        args: [--allow-multiple-documents]
        # Exclude generated/templated yaml docs-archive can be noisy.
        exclude: |
          (?x)^(
            docs/archive/.*|
            jarvismax_app/.*
          )$

  # ── Ruff (lint only, NO autofix to avoid massive churn) ─────────
  # The repo has ~107 pre-existing ruff errors (mostly orchestrate-mobile/
  # and legacy code paths). This hook lints only the files staged for
  # commit, so new code is held to ruff.toml standards without forcing
  # a sweeping cleanup of the existing baseline.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        name: ruff check (staged files only, no autofix)
        args: [--no-fix]
