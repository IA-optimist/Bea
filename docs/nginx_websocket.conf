# NGINX Configuration for JarvisMax Real-Time Dashboard with WebSocket
# This file provides a sample reverse proxy configuration for production deployment

# Upstream backend servers
upstream jarvismax_backend {
    server 127.0.0.1:8000;
    # Add more backend servers for load balancing
    # server 127.0.0.1:8001;
    # server 127.0.0.1:8002;
}

upstream jarvismax_frontend {
    server 127.0.0.1:3000;
}

# WebSocket connection upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name jarvismax.example.com;  # Change to your domain
    
    # Redirect HTTP to HTTPS (uncomment when SSL is configured)
    # return 301 https://$server_name$request_uri;

    client_max_body_size 100M;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # Frontend (React app)
    location / {
        proxy_pass http://jarvismax_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints
    location /api/ {
        proxy_pass http://jarvismax_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings for long-running API calls
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket endpoint - CRITICAL: Must support upgrade
    location /ws/ {
        proxy_pass http://jarvismax_backend;
        proxy_http_version 1.1;
        
        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeout settings (important for long-lived connections)
        proxy_connect_timeout 7d;    # Time to establish connection
        proxy_send_timeout 7d;       # Time between successive writes
        proxy_read_timeout 7d;       # Time between successive reads
        
        # Buffer settings for WebSocket
        proxy_buffering off;
        proxy_cache off;
        
        # Keep-alive
        proxy_set_header Connection "upgrade";
        keepalive_timeout 7d;
    }

    # Metrics HTTP endpoints (for monitoring)
    location /metrics/ {
        proxy_pass http://jarvismax_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files from backend (if any)
    location /static/ {
        alias /path/to/jarvismax/static/;  # Change to your static files path
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint (no auth required)
    location /health {
        proxy_pass http://jarvismax_backend/health;
        access_log off;
    }
}

