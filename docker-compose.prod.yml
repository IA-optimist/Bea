version: "3.9"

# Hardening (audit Mo6): plusieurs durcissements alignés avec docker-compose.yml dev :
#   1. Tous les secrets critiques (POSTGRES_PASSWORD, REDIS_PASSWORD) sont marqués
#      `:?` → docker compose refuse de démarrer si la variable est vide.
#   2. Le service `bea` n'expose plus son port 8000 à l'hôte : nginx le joint
#      via le réseau Docker interne (`upstream bea_api { server bea:8000; }`),
#      donc aucune raison d'écouter sur 0.0.0.0:8000 côté machine.
#   3. Un réseau dédié `bea-net` isole les services internes (postgres, redis,
#      qdrant, bea) ; seul nginx publie des ports.
#   4. Limites mémoire posées sur bea (évite l'OOM-host si fuite).
#   5. depends_on avec condition: service_healthy quand l'amont a un healthcheck.

services:
  bea:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [bea-net]
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 1g

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-beamax}
      POSTGRES_USER: ${POSTGRES_USER:-bea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bea}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [bea-net]

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    volumes: [redisdata:/data]
    healthcheck:
      # auth via env REDISCLI_AUTH so the password is not visible in `ps`
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    networks: [bea-net]

  qdrant:
    image: ${QDRANT_IMAGE:?set QDRANT_IMAGE, e.g. qdrant/qdrant:v1.9.7}
    restart: always
    volumes: [qdrantdata:/qdrant/storage]
    networks: [bea-net]

  ollama:
    image: ${OLLAMA_IMAGE:?set OLLAMA_IMAGE to a pinned ollama/ollama tag}
    restart: always
    volumes: [ollamadata:/root/.ollama]
    deploy:
      resources:
        limits:
          memory: 6g
    networks: [bea-net]

  nginx:
    image: nginx:alpine
    restart: always
    ports: ["80:80", "443:443"]
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      bea:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m
    networks: [bea-net]

networks:
  bea-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  ollamadata:
  certbot-etc:
  certbot-www:
