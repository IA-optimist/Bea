# gitleaks configuration — étend le config par défaut.
# https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml

[extend]
useDefault = true

[allowlist]
description = "Exclusions — fichiers qui contiennent des hashes/exemples connus non-secrets."
paths = [
  '''\.secrets\.baseline$''',
  '''docs/archive/''',
  '''tests/''',                  # fake secrets pour tests
  '''\.env\.example$''',         # placeholders CHANGE_ME
  '''beamax_app/''',             # Flutter source — secrets injectés via --dart-define, jamais hardcodés
  '''plugins/.*README''',        # Docs exemples de config (sk_live_xxx placeholders)
]

# Faux-positifs connus — commits qui déclenchent des FP (nom de variable, pas un vrai secret).
# Format gitleaks v8: commits = liste de strings directement dans [allowlist].
commits = [
  "9a54d39842e98c8f8d17fdf02bb02e4b8cfe4fa6",  # patch_signature.py:164 — variable `private_key`, pas un secret
]
