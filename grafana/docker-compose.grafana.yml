# Utiliser avec : docker compose -f docker-compose.yml -f grafana/docker-compose.grafana.yml up
services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: beamax-prometheus
    volumes:
      - ./grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - beamax-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: beamax-grafana
    # Port 3002 — frontend already uses 3001
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-bea_grafana}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - beamax-network

volumes:
  grafana_data:

networks:
  beamax-network:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-beamax}_beamax-network
