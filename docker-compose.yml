version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jarvismax-postgres
    environment:
      POSTGRES_DB: jarvismax
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jarvismax-network

  redis:
    image: redis:7-alpine
    container_name: jarvismax-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - jarvismax-network

  qdrant:
    image: ${QDRANT_IMAGE:?set QDRANT_IMAGE, e.g. qdrant/qdrant:v1.9.7}
    container_name: jarvismax-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null && exit 0 || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 30s
    networks:
      - jarvismax-network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: jarvismax-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://jarvis:${POSTGRES_PASSWORD}@postgres:5432/jarvismax
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      JARVIS_API_TOKEN: ${JARVIS_API_TOKEN}
      JARVIS_REQUIRE_AUTH: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OLLAMA_HOST: "http://172.20.0.4:11434"
      PYTHONUNBUFFERED: 1
    ports:
      # Hardening (audit Mo7): bind explicite loopback. En prod, Caddy/nginx
      # (compose.prod.yml) sert d'entrée publique ; l'API n'a pas à écouter
      # sur 0.0.0.0 depuis l'hôte de dev. Cohérent avec postgres/redis/qdrant
      # ci-dessous, déjà en 127.0.0.1.
      - "127.0.0.1:8000:8000"
    volumes:
      - ./:/app
      - ~/.jarvismax:/home/jarvis/.jarvismax
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: /app/start_with_deps.sh
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8000/health',timeout=4); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - jarvismax-network
      - jarvis_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jarvismax-frontend
    ports:
      - "3001:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - jarvismax-network
    restart: unless-stopped

  ollama:
    image: ${OLLAMA_IMAGE:?set OLLAMA_IMAGE to a pinned ollama/ollama tag}
    container_name: jarvismax-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - jarvismax-network

  caddy:
    image: caddy:2-alpine
    container_name: jarvismax-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - jarvismax-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
  caddy_data:
  caddy_config:

networks:
  jarvismax-network:
    driver: bridge
  jarvis_net:
    external: true
    name: jarvismax-app_jarvis_net
