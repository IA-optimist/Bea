version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jarvismax-postgres
    environment:
      POSTGRES_DB: jarvismax
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jarvismax-network

  redis:
    image: redis:7-alpine
    container_name: jarvismax-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - jarvismax-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: jarvismax-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/health"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 30s
    networks:
      - jarvismax-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvismax-api
    environment:
      DATABASE_URL: postgresql://jarvis:${POSTGRES_PASSWORD}@postgres:5432/jarvismax
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      JARVIS_API_TOKEN: ""
      JARVIS_REQUIRE_AUTH: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      PYTHONUNBUFFERED: 1
    volumes:
      - ./:/app
      - ~/.jarvismax:/root/.jarvismax
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: python main.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - jarvismax-network
    restart: unless-stopped

  nginx-lb:
    image: nginx:alpine
    container_name: jarvismax-nginx-lb
    ports:
      - "8000:80"
    volumes:
      - ./nginx-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - jarvismax-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jarvismax-frontend
    ports:
      - "3001:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - jarvismax-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: jarvismax-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - jarvismax-network

  caddy:
    image: caddy:2-alpine
    container_name: jarvismax-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - jarvismax-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
  caddy_data:
  caddy_config:

networks:
  jarvismax-network:
    driver: bridge
