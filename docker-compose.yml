version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: jarvismax-postgres
    environment:
      POSTGRES_USER: jarvismax
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jarvismax_secret_2026}
      POSTGRES_DB: jarvismax
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvismax"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jarvismax-network

  # Redis cache & task queue
  redis:
    image: redis:7-alpine
    container_name: jarvismax-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret_2026}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - jarvismax-network

  # JarvisMax Core OS
  jarvismax-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvismax-core
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: jarvismax
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jarvismax_secret_2026}
      POSTGRES_DB: jarvismax
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_2026}
      JARVISMAX_ENV: production
    volumes:
      - ./:/app
      - jarvismax_data:/root/.jarvismax
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"  # API server
    command: python3 core/jarvismax_os.py
    restart: unless-stopped
    networks:
      - jarvismax-network

  # FastAPI REST API
  jarvismax-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvismax-api
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: jarvismax
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jarvismax_secret_2026}
      POSTGRES_DB: jarvismax
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_2026}
      JARVISMAX_ENV: production
    volumes:
      - ./:/app
      - jarvismax_data:/root/.jarvismax
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jarvismax-core:
        condition: service_started
    ports:
      - "8000:8000"
    command: uvicorn web_api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - jarvismax-network

  # Web Dashboard (optional - coming soon)
  # jarvismax-dashboard:
  #   build:
  #     context: ./web_dashboard
  #     dockerfile: Dockerfile
  #   container_name: jarvismax-dashboard
  #   environment:
  #     API_URL: http://jarvismax-api:8000
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - jarvismax-api
  #   restart: unless-stopped
  #   networks:
  #     - jarvismax-network

  # Nginx reverse proxy (optional)
  # nginx:
  #   image: nginx:alpine
  #   container_name: jarvismax-nginx
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   depends_on:
  #     - jarvismax-api
  #   restart: unless-stopped
  #   networks:
  #     - jarvismax-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  jarvismax_data:
    driver: local

networks:
  jarvismax-network:
    driver: bridge
